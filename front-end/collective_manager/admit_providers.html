        <a href="revenue_reports.html" class="nav-item">

            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>

        <a href="admit_providers.html" class="nav-item active">
          <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />

          Admit Providers

        <a href="manage_units.html" class="nav-item">

          </svg>

    <div class="layout">
      <header class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search reports, transactions, or providers..."
          />
        </div>
        <div class="topbar-right">
          <button class="icon-btn">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
          <div class="avatar">A</div>
        </div>
      </header>

      <main class="main">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <line x1="19" y1="8" x2="19" y2="14" />
              <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
          </div>
          <div>
            <h1 class="page-title">Incoming Provider Requests</h1>
            <p class="page-sub" id="pendingCount">
              4 applications pending review
            </p>
          </div>
        </div>

        <div id="applicantsList"></div>

        <div class="recent-section">
          <div class="recent-header">
            <div class="recent-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </div>
            <div>
              <h2 class="section-title">Recently Approved Providers</h2>
              <p class="section-sub">Latest provider approvals</p>
            </div>
          </div>
          <div class="approved-grid" id="approvedGrid"></div>
        </div>
      </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="../js/collective_manager/admit_providers.js"></script>
