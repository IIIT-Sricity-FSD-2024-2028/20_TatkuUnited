<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings – Tatku United</title>
    <link rel="stylesheet" href="../../css/customer/bookings.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <a href="home.html" class="nav-brand">
        <div class="brand-logo">TU</div>
        <span class="brand-name">Tatku United</span>
      </a>
      <div class="nav-links">
        <a href="home.html" class="nav-link">Home</a>
        <a href="../service_pages/service_discovery.html" class="nav-link">Services</a>
        <a href="bookings.html" class="nav-link active">Bookings</a>
      </div>
      <div class="nav-right">
        <a href="cart.html" class="cart-btn">
          <svg viewBox="0 0 24 24">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <span class="cart-count" id="cart-count">0</span>
        </a>
        <a href="profile.html" class="user-avatar-btn" title="My Profile">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </a>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">My Bookings</h1>
          <p class="page-sub">Manage and track your scheduled home services</p>
        </div>
        <a href="../service_pages/service_discovery.html" class="btn-new-booking">
          <svg viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New Booking
        </a>
      </div>

      <div class="filters-bar">
        <div class="filter-tabs" id="filter-tabs"></div>
        <div class="filter-right">
          <button class="filter-btn">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            Date Range
            <svg viewBox="0 0 24 24" style="width: 13px; height: 13px">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <button class="filter-btn">
            <svg viewBox="0 0 24 24">
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="18" x2="14" y2="18" />
            </svg>
            Sort by: Newest
          </button>
        </div>
      </div>

      <div class="bookings-list" id="bookings-list"></div>
      <div class="pagination" id="pagination"></div>
    </main>

    <footer class="footer">
      <span>© 2026 Tatku United Inc. All rights reserved.</span>
      <div class="footer-links">
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Contact Support</a>
      </div>
    </footer>

    <!-- BOOKING DETAIL DRAWER -->
    <div
      class="drawer-overlay"
      id="drawer-overlay"
      onclick="closeDrawer(event)"
    >
      <div class="drawer" id="drawer">
        <button class="drawer-close" onclick="closeDrawerBtn()">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <div id="drawer-content"></div>
      </div>
    </div>

    <script src="../../js/customer/bookings.js"></script>
  </body>
</html>
