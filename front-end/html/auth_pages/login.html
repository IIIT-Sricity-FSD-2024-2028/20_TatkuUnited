<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tatku United</title>
  <link rel="stylesheet" href="../../css/auth_pages/login.css" />
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">🔧</div>
        <h1 class="login-title">Tatku United</h1>
        <p class="login-subtitle">Sign in to your account</p>
      </div>

      <!-- Form -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com"
            autocomplete="email" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-password-wrap">
            <input class="form-input" type="password" id="password" name="password" placeholder="••••••••"
              autocomplete="current-password" required />
            <button type="button" id="toggle-password" class="toggle-password" aria-label="Toggle password visibility">
              <span id="toggle-icon">👁</span>
            </button>
          </div>
        </div>

        <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>

        <button type="submit" class="btn-login" id="btn-login">Sign In</button>

      </form>

      <!-- Demo Tiles -->
      <div class="demo-section">
        <p class="demo-heading">Quick Demo Login</p>
        <div class="demo-grid">

          <button class="demo-tile demo-tile--superuser" data-email="super_user@fsd.com" data-password="Admin@1234">
            <span class="demo-icon">🛡</span>
            <span class="demo-role">Super User</span>
            <span class="demo-email">super_user@fsd.com</span>
            <span class="demo-pw">••••••••</span>
          </button>

          <button class="demo-tile demo-tile--collective_manager" data-email="suresh@collective.com"
            data-password="Password@123">
            <span class="demo-icon">🏢</span>
            <span class="demo-role">Collective Mgr</span>
            <span class="demo-email">suresh@collective.com</span>
            <span class="demo-pw">••••••••</span>
          </button>

          <button class="demo-tile demo-tile--unit_manager" data-email="karan.m@unit.com" data-password="Password@123">
            <span class="demo-icon">🔧</span>
            <span class="demo-role">Unit Manager</span>
            <span class="demo-email">karan.m@unit.com</span>
            <span class="demo-pw">••••••••</span>
          </button>

          <button class="demo-tile demo-tile--provider" data-email="ravi.kumar@mail.com" data-password="Password@123">
            <span class="demo-icon">👷</span>
            <span class="demo-role">Service Provider</span>
            <span class="demo-email">ravi.kumar@mail.com</span>
            <span class="demo-pw">••••••••</span>
          </button>

          <button class="demo-tile demo-tile--customer" data-email="aditya.v@gmail.com" data-password="Password@123">
            <span class="demo-icon">👤</span>
            <span class="demo-role">Customer</span>
            <span class="demo-email">aditya.v@gmail.com</span>
            <span class="demo-pw">••••••••</span>
          </button>

        </div>
      </div>

    </div><!-- /.login-card -->
  </div><!-- /.login-wrapper -->

  <!-- Script load order per spec -->
  <script src="../../js/data/store.js"></script>
  <script src="../../js/modules/auth.js"></script>
  <script src="../../js/utils/helpers.js"></script>
  <script src="../../js/utils/validation.js"></script>
  <script src="../../js/auth_pages/login.js"></script>

</body>

</html>
