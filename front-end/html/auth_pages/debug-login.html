<!DOCTYPE html>
<html>
<head>
    <title>Login Debug Helper</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .log { background: white; padding: 15px; border-radius: 5px; margin: 10px 0; border-left: 4px solid #ddd; }
        .error { border-left-color: #ff4444; background: #ffe6e6; }
        .success { border-left-color: #44ff44; background: #e6ffe6; }
        .info { border-left-color: #4444ff; background: #e6e6ff; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .button-group { margin: 20px 0; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #0066cc; color: white; border: none; border-radius: 3px; }
        button:hover { background: #0052a3; }
    </style>
</head>
<body>
    <h1>🔍 Login Debug Helper - Super User</h1>
    
    <div id="output"></div>

    <div class="button-group">
        <button onclick="checkRegistriesData()">1. Check Registry Data</button>
        <button onclick="checkAuthRegistry()">2. Check Auth Registry</button>
        <button onclick="testLogin()">3. Test Login</button>
        <button onclick="clearAll()">Clear Logs</button>
    </div>

    <script>
        const output = document.getElementById('output');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            if (typeof msg === 'object') {
                div.innerHTML = '<pre>' + JSON.stringify(msg, null, 2) + '</pre>';
            } else {
                div.textContent = msg;
            }
            output.appendChild(div);
        }

        function clearAll() {
            output.innerHTML = '';
        }

        function checkRegistriesData() {
            clearAll();
            log('=== Checking mockData Loading ===', 'info');
            
            if (!window.AppStore) {
                log('❌ AppStore not loaded', 'error');
                return;
            }

            if (!window.AppStore.data) {
                log('❌ AppStore.data not loaded', 'error');
                return;
            }

            const superUsers = window.AppStore.data.super_users;
            if (!superUsers) {
                log('❌ super_users table not found in AppStore.data', 'error');
                log('Available tables: ' + Object.keys(window.AppStore.data).join(', '), 'error');
                return;
            }

            log('✅ super_users table found', 'success');
            log('Count: ' + superUsers.length, 'success');
            
            if (superUsers.length === 0) {
                log('⚠️  super_users table is EMPTY!', 'error');
                return;
            }

            log('Super Users Data:', 'info');
            superUsers.forEach((su, i) => {
                log(`User ${i + 1}:`, 'info');
                log({
                    id: su.super_user_id,
                    name: su.name,
                    email: su.email,
                    emailLength: su.email?.length,
                    password: su.password,
                    passwordLength: su.password?.length,
                    is_active: su.is_active,
                    passwordBytes: su.password ? su.password.split('').map(c => c.charCodeAt(0)) : null
                }, 'info');
            });
        }

        function checkAuthRegistry() {
            clearAll();
            log('=== Checking Auth Registry ===', 'info');
            
            if (!window.AuthRegistry) {
                log('❌ AuthRegistry not initialized', 'error');
                log('Try loading a page that initializes auth first', 'error');
                return;
            }

            const suEntries = window.AuthRegistry.filter(e => e.role === 'super_user');
            log('Super User entries in AuthRegistry: ' + suEntries.length, 'info');
            
            if (suEntries.length === 0) {
                log('⚠️  No super_user entries found in AuthRegistry', 'error');
                return;
            }

            suEntries.forEach((entry, i) => {
                log(`Registry Entry ${i + 1}:`, 'info');
                log({
                    id: entry.id,
                    name: entry.name,
                    email: entry.email,
                    role: entry.role,
                    password: entry.password,
                    passwordLength: entry.password?.length,
                    is_active: entry.is_active,
                    passwordBytes: entry.password ? entry.password.split('').map(c => c.charCodeAt(0)) : null
                }, 'info');
            });
        }

        function testLogin() {
            clearAll();
            log('=== Testing Login ===', 'info');
            
            if (!window.Auth) {
                log('❌ Auth module not loaded', 'error');
                return;
            }

            if (!window.AuthRegistry) {
                log('❌ AuthRegistry not initialized', 'error');
                return;
            }

            // Test both known credentials
            const credentials = [
                { email: 'super_user.mark@tatku.com', password: 'SuperUser@123' },
                { email: 'super_user.sarah@tatku.com', password: 'SuperUser@123' }
            ];

            credentials.forEach(cred => {
                log(`Testing: ${cred.email} / ${cred.password}`, 'info');
                
                // Check if email exists in registry
                const found = window.AuthRegistry.find(u => 
                    (u.email || '').trim().toLowerCase() === cred.email.trim().toLowerCase()
                );
                
                if (!found) {
                    log(`  ❌ Email not found in registry`, 'error');
                    log(`  Registry has: ${window.AuthRegistry.map(u => u.email).join(', ')}`, 'error');
                    return;
                }

                log(`  ✅ Email found: ${found.name}`, 'success');
                log(`  Email: ${found.email}`, 'info');
                log(`  Password in registry: "${found.password}"`, 'info');
                log(`  Password length: ${found.password?.length}`, 'info');
                log(`  Is active: ${found.is_active}`, 'info');

                // Test password match
                const passwordMatches = found.password === cred.password;
                log(`  Password matches: ${passwordMatches}`, passwordMatches ? 'success' : 'error');

                // Test Auth.login
                try {
                    const result = window.Auth.login(cred.email, cred.password);
                    if (result.success) {
                        log(`  ✅ Login SUCCESS`, 'success');
                    } else {
                        log(`  ❌ Login FAILED: ${result.error}`, 'error');
                    }
                } catch (err) {
                    log(`  ❌ Login threw error: ${err.message}`, 'error');
                }
            });
        }

        // Auto-check on load
        log('Debug helper loaded. Click buttons to diagnose the issue.', 'info');
    </script>

    <!-- Load required scripts -->
    <script src="../../js/data/store.js"></script>
    <script src="../../js/modules/auth.js"></script>

    <script>
        // Wait for AppStore to be ready
        if (window.AppStore && window.AppStore.ready) {
            window.AppStore.ready.then(() => {
                log('✅ AppStore ready!', 'success');
                setTimeout(() => {
                    log('Now click "1. Check Registry Data" to start diagnosing', 'info');
                }, 100);
            });
        }
    </script>
</body>
</html>
