          </svg>
          Dashboard
        </a>
        <a href="providers.html" class="nav-item">
          <svg

          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Manage Providers
        </a>
        <a href="skills.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"

          >
            <path
              d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
            />
          </svg>
          Manage Skills
        </a>
        <a href="revenue.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="12" y1="1" x2="12" y2="23" />
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
          </svg>
          Revenue Reports
        </a>
        <a href="notifications.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />

      <div class="sidebar-footer">
        <a href="../auth_pages/logout.html" class="logout-link" id="logout-btn" onclick="return confirm('Are you sure you want to logout?');">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="search-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            placeholder="Search reports, transactions, or providers..."
          />
        </div>
        <div class="topbar-actions">
          <button
            class="notif-btn active"
            onclick="window.location.href = 'notifications.html'"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="notif-dot"></span>
          </button>
          <a href="profile.html" class="user-avatar" title="My Profile">TU</a>
        </div>
      </header>

      <main class="content">
        <div class="page-header">
          <div>
            <h1>Notifications</h1>
            <p>
              Stay up to date with alerts, updates, and activity across your
              unit.
            </p>
          </div>
          <div class="page-actions">
            <button class="btn-outline" onclick="markAllRead()">
              Mark all as read
            </button>
            <button class="btn-ghost-sm" onclick="clearAll()">Clear all</button>
          </div>
        </div>

        <!-- Filter Tabs -->
        <div class="notif-tabs">
          <button
            class="ntab active"
            data-type="all"
            onclick="setNotifFilter(this, 'all')"
          >
            All <span class="ntab-count" id="cntAll"></span>
          </button>
          <button
            class="ntab"
            data-type="alert"
            onclick="setNotifFilter(this, 'alert')"
          >
            Alerts <span class="ntab-count" id="cntAlert"></span>
          </button>
          <button
            class="ntab"
            data-type="info"
            onclick="setNotifFilter(this, 'info')"
          >
            Info <span class="ntab-count" id="cntInfo"></span>
          </button>
          <button
            class="ntab"
            data-type="success"
            onclick="setNotifFilter(this, 'success')"
          >
            Success <span class="ntab-count" id="cntSuccess"></span>
          </button>
        </div>

        <!-- Notifications List -->
        <div class="notif-list" id="notifList"></div>

        <div class="empty-state" id="emptyState" style="display: none">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <p>No notifications here.</p>
        </div>
      </main>
    </div>

    <script src="../../js/unit_manager/notifications.js"></script>
  </body>
</html>
