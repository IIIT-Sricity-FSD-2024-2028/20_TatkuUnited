<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Notifications – Tatku United</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/admin/notifications.css" />
  </head>
  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-avatar">TU</div>
        <span class="logo-name">Tatku United</span>
      </div>
      <div class="sidebar-section-label">OPERATIONAL PANEL</div>
      <nav class="sidebar-nav">
        <a href="admin_dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="user_management.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="7" r="4" />
            <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
            <circle cx="19" cy="7" r="2" />
            <path d="M23 21v-1a3 3 0 0 0-2-2.83" />
          </svg>
          User Management
        </a>
        <a href="collective_unit.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 3H8" /><path d="M12 3v4" />
          </svg>
          Collective &amp; Unit
        </a>
      </nav>
      <div class="sidebar-section-label">SYSTEM CONTROLS</div>
      <nav class="sidebar-nav">
        <a href="platform_settings.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          Platform Settings
        </a>
        <a href="system_monitoring.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          System Monitoring
        </a>
      </nav>
      <div class="sidebar-section-label">ACCOUNT</div>
      <nav class="sidebar-nav">
        <a href="notifications.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Notifications
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          My Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../auth_pages/logout.html" class="logout-btn" id="logout-btn" onclick="return confirm('Are you sure you want to logout?');">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main-wrapper">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Search notifications..." oninput="filterNotifications()" />
        </div>
        <div class="topbar-right">
          <a href="notifications.html" class="topbar-icon-btn active-notif" title="Notifications" style="position:relative; text-decoration:none; display:flex; align-items:center; justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="notif-badge" id="notif-badge">3</span>
          </a>
          <div class="topbar-user">
            <div class="user-info">
              <span class="user-name">Admin User</span>
              <span class="user-role">SUPER ADMIN</span>
            </div>
            <a href="profile.html" class="user-avatar" title="My Profile">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
              </svg>
            </a>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <div class="content-wrap">
        <div class="page-header">
          <div>
            <h1 class="page-title">Admin Notifications</h1>
            <p class="page-sub">System alerts, user reports, and platform-wide updates requiring your attention.</p>
          </div>
          <button class="mark-read-btn" onclick="markAllRead()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12" />
            </svg>
            Mark all as read
          </button>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="notif-tabs"></div>

        <!-- Notification List -->
        <div class="notif-list" id="notif-list"></div>

        <div class="load-more">
          <button class="load-more-btn" onclick="loadMore()">Load previous notifications ˅</button>
        </div>
      </div>
    </div>

    <script src="../../js/admin/notifications.js"></script>
  </body>
</html>
