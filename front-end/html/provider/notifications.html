<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications – Tatku United</title>
    <link rel="stylesheet" href="../../css/provider/notifications.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">TU</div>
        <div class="brand-text">
          <span class="brand-name">Tatku United</span>
          <span class="brand-sub">Provider Dashboard</span>
        </div>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="assigned-jobs.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path
              d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"
            />
            <path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z" />
          </svg>
          Assigned Jobs
        </a>
        <a href="calendar.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          Calendar
        </a>
        <a href="earnings.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"
            />
            <path d="M12 6v6l4 2" />
          </svg>
          Earnings
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../auth_pages/logout.html" class="nav-item logout" onclick="return confirm('Are you sure you want to logout?');">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16,17 21,12 16,7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <div class="topbar-right">
          <a href="notifications.html" class="notif-btn active-notif">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 01-3.46 0" />
            </svg>
            <span class="notif-dot"></span>
          </a>
          <a href="profile.html" class="user-chip">
            <div class="user-avatar">P</div>
            <span>Provider</span>
          </a>
        </div>
      </header>

      <main class="content">
        <div class="page-header">
          <div>
            <h1 class="page-title">Notifications</h1>
            <p class="page-sub">
              Stay updated with your latest activities and job alerts.
            </p>
          </div>
          <button class="mark-read-btn" onclick="markAllRead()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
            Mark all as read
          </button>
        </div>

        <div class="notif-tabs" id="notif-tabs"></div>
        <div class="notif-list" id="notif-list"></div>
        <div class="load-more">
          <button class="load-more-btn" onclick="loadMore()">
            Load previous notifications ˅
          </button>
        </div>
      </main>
    </div>

    <script src="../../js/provider/notifications.js"></script>
  </body>
</html>
