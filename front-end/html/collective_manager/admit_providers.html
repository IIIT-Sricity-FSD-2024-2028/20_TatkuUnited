<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collective Manager – Admit Providers</title>
    <link
      rel="stylesheet"
      href="../../css/collective_manager/admit_providers.css"
    />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">TU</div>
        <span class="brand-name">Collective Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="revenue_reports.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          Revenue Reports
        </a>
        <a href="admit_providers.html" class="nav-item active">
          <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          Admit Providers
        </a>
        <a href="manage_units.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
            />
          </svg>
          Manage Units
        </a>

        <a href="notifications.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Notifications
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          My Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../auth_pages/logout.html" class="logout-link" id="logout-btn" onclick="return confirm('Are you sure you want to logout?');">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <div class="layout">
      <header class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search reports, transactions, or providers..."
          />
        </div>
        <div class="topbar-right">
          <a href="notifications.html" class="icon-btn" title="Notifications" style="position:relative; text-decoration:none; display:flex; align-items:center; justify-content:center;">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </a>
          <a href="profile.html" class="avatar" title="My Profile">CM</a>
        </div>
      </header>

      <main class="main">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <line x1="19" y1="8" x2="19" y2="14" />
              <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
          </div>
          <div>
            <h1 class="page-title">Incoming Provider Requests</h1>
            <p class="page-sub" id="pendingCount">
              4 applications pending review
            </p>
          </div>
        </div>

        <div id="applicantsList"></div>

        <div class="recent-section">
          <div class="recent-header">
            <div class="recent-icon">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </div>
            <div>
              <h2 class="section-title">Recently Approved Providers</h2>
              <p class="section-sub">Latest provider approvals</p>
            </div>
          </div>
          <div class="approved-grid" id="approvedGrid"></div>
        </div>
      </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- VIEW DETAILS MODAL -->
    <div class="details-overlay" id="detailsOverlay" onclick="closeDetailsModal(event)">
      <div class="details-modal" id="detailsModal">
        <button class="details-close" onclick="closeDetailsModalBtn()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="details-header">
          <div class="details-avatar" id="detailsAvatar"></div>
          <div>
            <div class="details-name" id="detailsName"></div>
            <div class="details-skill-badge" id="detailsSkillBadge"></div>
          </div>
        </div>
        <div class="details-body">
          <div class="details-section-title">Contact & Location</div>
          <div class="details-grid">
            <div class="details-field">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg>
              <span id="detailsPhone"></span>
            </div>
            <div class="details-field">
              <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <span id="detailsEmail"></span>
            </div>
            <div class="details-field details-field-full">
              <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span id="detailsLocation"></span>
            </div>
          </div>
          <div class="details-section-title details-section-title--docs">Uploaded Documents</div>
          <div id="detailsDocs" class="details-docs"></div>
        </div>
      </div>
    </div>

    <script src="../../js/data/store.js"></script>
    <script src="../../js/modules/auth.js"></script>
    <script src="../../js/collective_manager/admit_providers.js"></script>
  </body>
</html>
