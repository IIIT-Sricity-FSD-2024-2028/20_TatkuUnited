<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collective Manager – Manage Skills</title>
    <link
      rel="stylesheet"
      href="../../css/collective_manager/manage_skills.css"
    />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">TU</div>
        <span class="brand-name">Collective Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="revenue_reports.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          Revenue Reports
        </a>
        <a href="admit_providers.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          Admit Providers
        </a>
        <a href="manage_units.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
            />
          </svg>
          Manage Units
        </a>
        <a href="manage_skills.html" class="nav-item active">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
          </svg>
          Manage Skills
        </a>
        <a href="notifications.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Notifications
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          My Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../auth_pages/logout.html" class="logout-link" id="logout-btn" onclick="return confirm('Are you sure you want to logout?');">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <div class="layout">
      <header class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Search reports, transactions, or providers..."
          />
        </div>
        <div class="topbar-right">
          <a href="notifications.html" class="icon-btn" title="Notifications" style="position:relative; text-decoration:none; display:flex; align-items:center; justify-content:center;">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </a>
          <a href="profile.html" class="avatar" title="My Profile">CM</a>
        </div>
      </header>

      <main class="main">
        <div class="page-header">
          <div>
            <h1 class="page-title">Skill Management</h1>
            <p class="page-sub">
              Manage the skill catalog used by service providers on the
              platform.
            </p>
          </div>
          <button class="btn-add" id="btnAddSkill">
            <svg viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add New Skill
          </button>
        </div>

        <div class="table-card">
          <div class="table-toolbar">
            <div class="search-wrap" style="width: 360px">
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                class="search-input"
                placeholder="Search skills..."
                id="skillSearch"
              />
            </div>
            <select class="cat-filter" id="catFilter">
              <option value="All">All</option>
              <option value="Trade">Trade</option>
              <option value="Creative">Creative</option>
              <option value="Technical">Technical</option>
              <option value="Management">Management</option>
              <option value="Communication">Communication</option>
            </select>
          </div>

          <table class="skills-table">
            <thead>
              <tr>
                <th>Skill Name</th>
                <th>Category</th>
                <th>Description</th>
                <th>Providers</th>
                <th>Services</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="skillsTableBody"></tbody>
          </table>

          <div class="table-footer" id="tableFooter"></div>
        </div>
      </main>
    </div>

    <!-- Skill Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modalTitle">Add New Skill</h2>
          <button class="modal-close" id="modalClose">
            <svg viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Skill Name</label>
            <input
              type="text"
              class="form-input"
              id="skillName"
              placeholder="e.g. Plumbing"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-input" id="skillCategory">
              <option>Trade</option>
              <option>Creative</option>
              <option>Technical</option>
              <option>Management</option>
              <option>Communication</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea
              class="form-input form-textarea"
              id="skillDesc"
              placeholder="Brief description of this skill..."
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-input" id="skillStatus">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="btnCancel">Cancel</button>
          <button class="btn-save" id="btnSave">Add Skill</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../../js/collective_manager/manage_skills.js"></script>
  </body>
</html>
