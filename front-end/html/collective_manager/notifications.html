<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications – Collective Manager | Tatku United</title>
    <link rel="stylesheet" href="../../css/collective_manager/notifications.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">TU</div>
        <span class="brand-name">Collective Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="revenue_reports.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          Revenue Reports
        </a>
        <a href="admit_providers.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          Admit Providers
        </a>
        <a href="manage_units.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
          </svg>
          Manage Units
        </a>

        <a href="notifications.html" class="nav-item active">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          Notifications
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          My Profile
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../auth_pages/logout.html" class="logout-link" id="logout-btn" onclick="return confirm('Are you sure you want to logout?');">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Layout -->
    <div class="layout">
      <!-- Topbar -->
      <header class="topbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" class="search-input" placeholder="Search notifications..." id="search-input" oninput="filterNotifications()" />
        </div>
        <div class="topbar-right">
          <a href="notifications.html" class="icon-btn active-notif" title="Notifications" style="position:relative">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="notif-badge" id="notif-badge">5</span>
          </a>
          <a href="profile.html" class="avatar" title="My Profile">CM</a>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main">
        <div class="page-header">
          <div>
            <h1 class="page-title">Notifications</h1>
            <p class="page-sub">Stay updated on your units, providers, and collective performance.</p>
          </div>
          <button class="mark-read-btn" id="mark-all-btn" onclick="markAllRead()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
            Mark all as read
          </button>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="notif-tabs"></div>

        <!-- Notification List -->
        <div class="notif-list" id="notif-list"></div>

        <div class="load-more">
          <button class="load-more-btn" onclick="loadMore()">Load previous notifications ˅</button>
        </div>
      </main>
    </div>

    <script src="../../js/collective_manager/notifications.js"></script>
  </body>
</html>
